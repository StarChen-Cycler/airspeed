can_left: can0
can_right: can1
can_interface: socketcan
left_joints:
- openarm_left_joint1
- openarm_left_joint2
- openarm_left_joint3
- openarm_left_joint4
- openarm_left_joint5
- openarm_left_joint6
- openarm_left_joint7
- openarm_left_gripper
right_joints:
- openarm_right_joint1
- openarm_right_joint2
- openarm_right_joint3
- openarm_right_joint4
- openarm_right_joint5
- openarm_right_joint6
- openarm_right_joint7
- openarm_right_gripper
gripper_open_deg: -65.0
kp:
  # Middle-ground tune (2026-07-23): kp 60 was too soft (slow following),
  # kp 90/45 was too stiff (shake on fast moves). Split the difference:
  # J1-J4 at 75, wrist at 12, J6 pushed to 40 for loaded-wrist tracking.
  # kd is preserved/scaled to keep damping reasonable on the unstable mount.
  joint_1: 75.0
  joint_2: 75.0
  joint_3: 75.0
  joint_4: 75.0
  joint_5: 12.0
  joint_6: 40.0
  joint_7: 12.0
  gripper: 12.0
kd:
  # Damiao MIT protocol caps kd at 5.0 (12-bit wire range). Values here go
  # on the wire verbatim; startup validation rejects anything out of range.
  joint_1: 5.0
  joint_2: 5.0
  joint_3: 5.0
  joint_4: 5.0
  joint_5: 1.3  # sqrt-scaled from wrist baseline (kp 6, kd 0.9)
  joint_6: 2.7  # sqrt-scaled from baseline (kp 8, kd 1.2)
  joint_7: 1.3
  gripper: 1.0  # sqrt-scaled from baseline (kp 10, kd 0.9)
arm_state_hz: 50
# Per-cycle slew clamp. At 50 Hz, 1.8 deg/cycle keeps the effective speed
# limit at 90 deg/s (same envelope as 3.0 deg/cycle at 30 Hz).
max_joint_delta_deg: 1.8
max_gripper_delta_deg: 10.0
stream_timeout_s: 0.5
return_home_seconds: 3.0
ws_uri: ws://localhost:5200/ws/arm
urdf_path: urdf/openarm_bimanual_pybullet.urdf
