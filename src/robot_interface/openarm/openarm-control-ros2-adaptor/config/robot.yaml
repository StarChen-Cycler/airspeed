can_left: can0
can_right: can1
can_interface: socketcan
left_joints:
- openarm_left_joint1
- openarm_left_joint2
- openarm_left_joint3
- openarm_left_joint4
- openarm_left_joint5
- openarm_left_joint6
- openarm_left_joint7
- openarm_left_gripper
right_joints:
- openarm_right_joint1
- openarm_right_joint2
- openarm_right_joint3
- openarm_right_joint4
- openarm_right_joint5
- openarm_right_joint6
- openarm_right_joint7
- openarm_right_gripper
gripper_open_deg: -65.0
kp:
  # Tuned 2026-07-22, step 2 (step 1: J1-J4 60->90, wrist ~3x — validated:
  # tau J1-J4 80->35 ms, wrist 200->100 ms, J6 400->160 ms, no ringing).
  # J1-J4 90 -> 120 (damping ~0.71x of original — watch overshoot at brisk
  # moves). Wrist ~1.5x with kd sqrt-scaled (damping preserved): J6 remains
  # the weakest; if it still under-reaches at kp 36, the cause is mechanical,
  # not gains. Next lever after this is velocity feed-forward, not more kp.
  joint_1: 120.0
  joint_2: 120.0
  joint_3: 120.0
  joint_4: 120.0
  joint_5: 27.0
  joint_6: 36.0
  joint_7: 27.0
  gripper: 20.0
kd:
  # Damiao MIT protocol caps kd at 5.0 (12-bit wire range). Values here go
  # on the wire verbatim; startup validation rejects anything out of range.
  joint_1: 5.0
  joint_2: 5.0
  joint_3: 5.0
  joint_4: 5.0
  joint_5: 2.0
  joint_6: 2.6
  joint_7: 2.0
  gripper: 1.4
arm_state_hz: 50
# Per-cycle slew clamp. At 50 Hz, 1.8 deg/cycle keeps the effective speed
# limit at 90 deg/s (same envelope as 3.0 deg/cycle at 30 Hz).
max_joint_delta_deg: 1.8
max_gripper_delta_deg: 10.0
stream_timeout_s: 0.5
return_home_seconds: 3.0
ws_uri: ws://localhost:5200/ws/arm
urdf_path: urdf/openarm_bimanual_pybullet.urdf
