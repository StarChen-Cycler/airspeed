can_left: can0
can_right: can1
can_interface: socketcan
left_joints:
- openarm_left_joint1
- openarm_left_joint2
- openarm_left_joint3
- openarm_left_joint4
- openarm_left_joint5
- openarm_left_joint6
- openarm_left_joint7
- openarm_left_gripper
right_joints:
- openarm_right_joint1
- openarm_right_joint2
- openarm_right_joint3
- openarm_right_joint4
- openarm_right_joint5
- openarm_right_joint6
- openarm_right_joint7
- openarm_right_gripper
gripper_open_deg: -65.0
kp:
  # Validated safe operating point (step 1, 2026-07-22).
  #
  # *** INCIDENT + REVERT (2026-07-22) ***
  # Step 2 (J1-J4 kp 120) caused a right-arm-wide oscillation that built up
  # under load after ~12 s of teleop (episode T1-20260722T111654047279Z) —
  # kp rose 50% while kd is hard-capped at 5.0 on the wire, leaving the loop
  # under-damped; the loaded right arm tipped into shaking and the run was
  # stopped. REVERTED to step 1. kp 90 IS THE ESTABLISHED MAXIMUM —
  # do not raise J1-J4 kp on this mount; the wrist/J6 values here are also
  # the step-1 ones (the later J6 36->45 experiment is rolled back too —
  # re-apply separately if loaded-wrist tracking still needs it).
  joint_1: 90.0
  joint_2: 90.0
  joint_3: 90.0
  joint_4: 90.0
  joint_5: 18.0
  joint_6: 24.0
  joint_7: 18.0
  gripper: 15.0
kd:
  # Damiao MIT protocol caps kd at 5.0 (12-bit wire range). Values here go
  # on the wire verbatim; startup validation rejects anything out of range.
  joint_1: 5.0
  joint_2: 5.0
  joint_3: 5.0
  joint_4: 5.0
  joint_5: 1.6
  joint_6: 2.1
  joint_7: 1.6
  gripper: 1.2
arm_state_hz: 50
# Per-cycle slew clamp. At 50 Hz, 1.8 deg/cycle keeps the effective speed
# limit at 90 deg/s (same envelope as 3.0 deg/cycle at 30 Hz).
max_joint_delta_deg: 1.8
max_gripper_delta_deg: 10.0
stream_timeout_s: 0.5
return_home_seconds: 3.0
ws_uri: ws://localhost:5200/ws/arm
urdf_path: urdf/openarm_bimanual_pybullet.urdf
